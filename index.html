<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Firebase leaderboard-ready mini browser game for Vercel."
    />
    <title>Coin Dash</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="game stats">
        <div>
          <span>닉네임</span>
          <strong id="currentName">Player</strong>
        </div>
        <div>
          <span>점수</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>남은 시간</span>
          <strong id="time">30</strong>
        </div>
        <div>
          <span>최고 점수</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <canvas id="game" width="720" height="480" aria-label="Coin Dash game"></canvas>

      <section class="panel">
        <div>
          <h1>Coin Dash</h1>
          <p>30초 안에 천천히 떨어지는 코인을 최대한 많이 모으세요.</p>
        </div>
        <div class="controls">
          <button id="start" type="button">시작</button>
          <button id="save" type="button" disabled>점수 저장</button>
        </div>
        <label class="name-field">
          <span>닉네임</span>
          <input id="playerName" maxlength="16" placeholder="Player" autocomplete="off" />
        </label>
      </section>

      <section class="leaderboard" aria-label="leaderboard">
        <h2>랭킹</h2>
        <ol id="leaders">
          <li>아직 저장된 점수가 없어요.</li>
        </ol>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
